<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空射擊小遊戲 - 慢速樂活版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            letter-spacing: 2px;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #000428, #004e92);
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.5);
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 1px 1px 2px black;
            display: flex;
            gap: 20px;
        }
        #lives-display {
            color: #ff4757;
        }
        #game-canvas {
            display: block;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .hidden {
            display: none !important;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #ff4757;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <h1>SPACE SHOOTER</h1>
    <div id="game-container">
        <div id="ui-layer">
            <div>分數: <span id="score-display">0</span></div>
            <div>生命: <span id="lives-display">❤️❤️❤️</span></div>
        </div>
        
        <div id="game-over-screen" class="hidden">
            <h2 style="color: #ff4757; font-size: 32px;">GAME OVER</h2>
            <p style="margin-top: 10px;">最終得分: <span id="final-score">0</span></p>
            <button id="restart-btn">重新開始</button>
        </div>

        <canvas id="game-canvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        // 🎮 遊戲核心變數
        let score = 0;
        let lives = 3; 
        let isGameOver = false;
        let keys = {};

        // 玩家噴射機設定
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 70,
            width: 50,
            height: 50,
            speed: 5
        };

        let bullets = [];
        let enemies = []; 
        
        let spawnTimer = 0;
        let spawnInterval = 50; 

        // 🚀 繪製噴射戰機 (玩家：藍色)
        function drawPlayer(x, y, w, h) {
            ctx.save();
            ctx.fillStyle = Math.random() > 0.5 ? '#ff9100' : '#ff3d00';
            ctx.beginPath();
            ctx.moveTo(x + w * 0.4, y + h * 0.8);
            ctx.lineTo(x + w * 0.5, y + h * 1.1); 
            ctx.lineTo(x + w * 0.6, y + h * 0.8);
            ctx.fill();

            ctx.fillStyle = '#00d2ff';
            ctx.beginPath();
            ctx.moveTo(x + w / 2, y + h * 0.1);  
            ctx.lineTo(x + w, y + h * 0.8);      
            ctx.lineTo(x + w * 0.7, y + h * 0.7); 
            ctx.lineTo(x + w * 0.3, y + h * 0.7); 
            ctx.lineTo(x, y + h * 0.8);          
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#0066ff';
            ctx.beginPath();
            ctx.moveTo(x + w / 2, y + h * 0.1);
            ctx.lineTo(x + w * 0.65, y + h * 0.7);
            ctx.lineTo(x + w * 0.35, y + h * 0.7);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#e0f7fa';
            ctx.beginPath();
            ctx.moveTo(x + w / 2, y + h * 0.25);
            ctx.lineTo(x + w * 0.58, y + h * 0.45);
            ctx.lineTo(x + w * 0.42, y + h * 0.45);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // 🛩️ 繪製友軍戰機 (友軍：綠色)
        function drawFriend(x, y, w, h) {
            ctx.save();
            ctx.fillStyle = Math.random() > 0.5 ? '#bfff00' : '#00ff66';
            ctx.beginPath();
            ctx.moveTo(x + w * 0.4, y + h * 0.2);
            ctx.lineTo(x + w * 0.5, y - h * 0.1); 
            ctx.lineTo(x + w * 0.6, y + h * 0.2);
            ctx.fill();

            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.moveTo(x + w / 2, y + h * 0.9);  
            ctx.lineTo(x + w, y + h * 0.2);      
            ctx.lineTo(x + w * 0.7, y + h * 0.3); 
            ctx.lineTo(x + w * 0.3, y + h * 0.3); 
            ctx.lineTo(x, y + h * 0.2);          
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#e0f7fa';
            ctx.beginPath();
            ctx.moveTo(x + w / 2, y + h * 0.75);
            ctx.lineTo(x + w * 0.58, y + h * 0.55);
            ctx.lineTo(x + w * 0.42, y + h * 0.55);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // 🔫 繪製發光雷射子彈
        function drawBullet(x, y, w, h) {
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(x + 2, y, w - 4, h);
            ctx.fillStyle = '#00ffff'; 
            ctx.fillRect(x, y + 4, w, h - 8);
            ctx.restore();
        }

        // ☄️ 繪製岩漿隕石
        function drawMeteor(x, y, w, h) {
            ctx.save();
            let cx = x + w / 2;
            let cy = y + h / 2;
            let r = w / 2;
            ctx.fillStyle = '#4e342e';
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ff3d00';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx - r * 0.4, cy - r * 0.2);
            ctx.lineTo(cx + r * 0.2, cy + r * 0.4);
            ctx.stroke();
            ctx.fillStyle = '#261b18';
            ctx.beginPath();
            ctx.arc(cx + r * 0.3, cy - r * 0.3, r * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // 鍵盤操作監聽
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if(['Space', ' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); 
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // 空白鍵發射子彈
        window.addEventListener('keydown', (e) => {
            if ((e.key === ' ' || e.key === 'Space') && !isGameOver) {
                bullets.push({
                    x: player.x + player.width / 2 - 4, 
                    y: player.y - 15,
                    width: 8,  
                    height: 25, 
                    speed: 8
                });
            }
        });

        function updateLivesUI() {
            let heartStr = '';
            for(let i = 0; i < lives; i++) {
                heartStr += '❤️';
            }
            livesDisplay.textContent = heartStr || '❌';
        }

        function initGame() {
            score = 0;
            lives = 3; 
            isGameOver = false;
            bullets = [];
            enemies = [];
            player.x = canvas.width / 2 - 25;
            scoreDisplay.textContent = score;
            updateLivesUI();
            gameOverScreen.classList.add('hidden');
        }

        restartBtn.addEventListener('click', () => {
            initGame();
            gameLoop();
        });

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function handleMiss() {
            lives--;
            updateLivesUI();
            if (lives <= 0) {
                endGame();
            }
        }

        // 遊戲主迴圈
        function gameLoop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 玩家移動
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.x -= player.speed;
                if (player.x < 0) player.x = 0;
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.x += player.speed;
                if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            }

            drawPlayer(player.x, player.y, player.width, player.height);

            // 子彈更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                drawBullet(bullets[i].x, bullets[i].y, bullets[i].width, bullets[i].height);
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // 物體生成邏輯
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                let size = Math.random() * 20 + 25;
                let isFriend = Math.random() < 0.25; 
                
                let validPosition = false;
                let spawnX = 0;
                let attempts = 0;

                while (!validPosition && attempts < 10) {
                    spawnX = Math.random() * (canvas.width - size);
                    validPosition = true;
                    attempts++;

                    for (let j = 0; j < enemies.length; j++) {
                        let other = enemies[j];
                        if (other.y < 80 && Math.abs(spawnX - other.x) < (size + 15)) {
                            validPosition = false;
                            break;
                        }
                    }
                }

                enemies.push({
                    x: spawnX,
                    y: -size,
                    width: size,
                    height: size,
                    // 🐌 速度調慢！從原來的 (1.5 ~ 3.5) 改為 (0.8 ~ 1.8)
                    speed: Math.random() * 1 + 0.8, 
                    type: isFriend ? 'friend' : 'meteor'
                });
                spawnTimer = 0;
            }

            // 物體更新與碰撞
            for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                let obj = enemies[eIdx];
                obj.y += obj.speed;

                if (obj.type === 'meteor') {
                    drawMeteor(obj.x, obj.y, obj.width, obj.height);
                } else {
                    drawFriend(obj.x, obj.y, obj.width, obj.height);
                }

                if (checkCollision(player, obj)) {
                    enemies.splice(eIdx, 1);
                    if (obj.type === 'meteor') {
                        handleMiss(); 
                    }
                    continue; 
                }

                if (obj.y > canvas.height) {
                    enemies.splice(eIdx, 1);
                    if (obj.type === 'meteor') {
                        handleMiss(); 
                    }
                    continue;
                }

                for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
                    if (checkCollision(bullets[bIdx], obj)) {
                        bullets.splice(bIdx, 1);
                        enemies.splice(eIdx, 1);
                        
                        if (obj.type === 'meteor') {
                            score += 1; 
                            scoreDisplay.textContent = score;
                        } else {
                            handleMiss();
                        }
                        break; 
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameOver = true;
            finalScore.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        gameLoop();
    </script>
</body>
</html>
